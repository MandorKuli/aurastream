<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06070a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0f111a" />
  <circle cx="200" cy="200" r="180" fill="url(#glow)"/>
  
  <!-- Vinyl disc visual design -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#25293c" stroke-width="6" opacity="0.4" />
  <circle cx="200" cy="200" r="120" fill="none" stroke="#25293c" stroke-width="4" opacity="0.3" />
  <circle cx="200" cy="200" r="100" fill="none" stroke="#25293c" stroke-width="2" opacity="0.2" />
  
  <!-- Center art -->
  <circle cx="200" cy="200" r="70" fill="url(#purpleGrad)" />
  
  <!-- Animated music note icon design -->
  <path d="M190,175 L190,210 A15,15 0 1,1 175,195 A15,15 0 0,1 190,210 L190,185 L220,180 L220,200 A15,15 0 1,1 205,185 A15,15 0 0,1 220,200 L220,170 L190,175 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Outer glowing rings -->
  <rect x="20" y="20" width="360" height="360" rx="16" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
</svg>
